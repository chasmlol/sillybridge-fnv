# NVBridge native DirectSound config.
# Copy this to the bridge folder as native_debug.cfg. By default the plugin and
# chasm rendezvous at %LOCALAPPDATA%\chasm\bridge (shared automatically, outside
# Mod Organizer 2's virtual filesystem), so you normally do NOT need to set a
# path here at all. Drop native_debug.cfg into that folder, or override the
# location with bridge_root_path / the CHASM_BRIDGE_ROOT env var (see below).
runtime_heartbeat=1
speech_animation=1
speech_write_phoneme_values=1
speech_write_face_flags=1
speech_clear_binding_on_stop=1
subtitles=1
listener_updates=1
directsound_3d=1
directsound_software_buffer=1
drain_queued_chunks_after_final=1
speech_weight_scale=1.00
runtime_heartbeat_interval_ms=100
streaming_chunk_overlap_ms=40
autostart_stack=0
stack_bootstrap_cooldown_ms=15000
stack_launcher_path=
# bridge_root_path: optional override for the rendezvous dir. Leave unset to use
# the default %LOCALAPPDATA%\chasm\bridge. If set here (or via the CHASM_BRIDGE_ROOT
# environment variable, which wins as the full path), it must match what chasm uses.
# bridge_root_path=
