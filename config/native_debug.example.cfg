# NVBridge native DirectSound config.
# Copy this to the game/MO2 runtime bridge folder as native_debug.cfg and set
# bridge_root_path to the writable NVBridge runtime folder used by MO2 overwrite.
runtime_heartbeat=1
speech_animation=1
speech_write_phoneme_values=1
speech_write_face_flags=1
speech_clear_binding_on_stop=1
subtitles=1
listener_updates=1
directsound_3d=1
directsound_software_buffer=1
drain_queued_chunks_after_final=1
speech_weight_scale=1.00
runtime_heartbeat_interval_ms=100
streaming_chunk_overlap_ms=40
autostart_stack=0
stack_bootstrap_cooldown_ms=15000
stack_launcher_path=
bridge_root_path=C:/Path/To/ModOrganizer/New Vegas/overwrite/NVBridge
